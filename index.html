<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monthly Budget Calendar Tracker</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-512.png">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Theme Variables ── */
  [data-theme="dark"] {
    --bg-primary: #0f172a;
    --bg-surface: #1e293b;
    --bg-elevated: #162032;
    --border: #334155;
    --border-hover: #475569;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-tertiary: #64748b;
    --text-heading: #cbd5e1;
    --accent: #38bdf8;
    --success: #4ade80;
    --danger: #f87171;
    --warning: #fbbf24;
    --purple: #a78bfa;
    --btn-primary: #2563eb;
    --btn-primary-hover: #1d4ed8;
    --status-under-bg: #064e3b;
    --status-under-text: #4ade80;
    --status-over-bg: #7f1d1d;
    --status-over-text: #f87171;
    --status-empty-bg: #1e293b;
    --status-empty-text: #64748b;
    --google-btn-bg: #fff;
    --google-btn-text: #333;
    --google-btn-hover: #f1f5f9;
    --current-row-bg: #1e3a5f;
    --current-row-hover: #254a6f;
    --year-header-hover: #1e3050;
    --month-card-hover: #1a2744;
    --scrollbar-track: #1e293b;
    --scrollbar-thumb: #475569;
    --glass-bg: rgba(17, 26, 46, 0.68);
    --glass-bg-strong: rgba(17, 26, 46, 0.82);
    --glass-border: rgba(126, 200, 255, 0.14);
    --glass-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
    --nav-active-bg: rgba(56, 189, 248, 0.14);
    --nav-active-border: rgba(56, 189, 248, 0.38);
  }

  [data-theme="light"] {
    --bg-primary: #f8fafc;
    --bg-surface: #ffffff;
    --bg-elevated: #f1f5f9;
    --border: #e2e8f0;
    --border-hover: #cbd5e1;
    --text-primary: #1e293b;
    --text-secondary: #475569;
    --text-tertiary: #64748b;
    --text-heading: #334155;
    --accent: #0284c7;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #d97706;
    --purple: #7c3aed;
    --btn-primary: #2563eb;
    --btn-primary-hover: #1d4ed8;
    --status-under-bg: #dcfce7;
    --status-under-text: #16a34a;
    --status-over-bg: #fee2e2;
    --status-over-text: #dc2626;
    --status-empty-bg: #f1f5f9;
    --status-empty-text: #94a3b8;
    --google-btn-bg: #ffffff;
    --google-btn-text: #1e293b;
    --google-btn-hover: #f1f5f9;
    --current-row-bg: #dbeafe;
    --current-row-hover: #bfdbfe;
    --year-header-hover: #e2e8f0;
    --month-card-hover: #f1f5f9;
    --scrollbar-track: #f1f5f9;
    --scrollbar-thumb: #cbd5e1;
    --glass-bg: rgba(255, 255, 255, 0.72);
    --glass-bg-strong: rgba(255, 255, 255, 0.88);
    --glass-border: rgba(2, 132, 199, 0.16);
    --glass-shadow: 0 14px 34px rgba(15, 23, 42, 0.10);
    --nav-active-bg: rgba(2, 132, 199, 0.10);
    --nav-active-border: rgba(2, 132, 199, 0.26);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }

  .app { max-width: 600px; margin: 0 auto; }

  /* ── Tab Layout ── */
  .app-shell {
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden;
  }

  /* Top bar */
  .top-bar {
    flex-shrink: 0;
    background: var(--bg-surface); border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .top-bar-left { display: flex; align-items: center; gap: 8px; }
  .top-bar h1 { font-size: 1rem; color: var(--accent); white-space: nowrap; }

  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button {
    background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: .9rem;
    transition: background .2s; min-height: 36px;
  }
  .month-nav button:hover { background: var(--border); }
  .month-nav span { font-size: .95rem; font-weight: 600; min-width: 130px; text-align: center; }

  /* Tab content area */
  .tab-content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 12px 16px;
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 70px);
  }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Bottom nav */
  .bottom-nav {
    flex-shrink: 0;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15, 23, 42, 0.78); border-top: 1px solid var(--glass-border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex; z-index: 100;
    padding: 7px 8px calc(env(safe-area-inset-bottom, 0px) + 7px);
    max-width: 600px; margin: 0 auto;
    box-shadow: 0 -12px 28px rgba(0, 0, 0, 0.22);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 7px 4px; background: transparent; border: 1px solid transparent; cursor: pointer;
    color: var(--text-tertiary); font-size: .65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .04em;
    transition: color .2s, background .2s, border-color .2s, transform .2s; -webkit-tap-highlight-color: transparent;
    min-height: 56px;
    border-radius: 16px;
  }
  .nav-btn .nav-icon { font-size: 1.3rem; line-height: 1; }
  .nav-btn .nav-icon img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    display: block;
    filter: grayscale(35%) opacity(.72);
    transition: transform .2s, filter .2s;
  }
  .nav-btn .nav-icon.icon-light-bg {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.94);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
  }
  .nav-btn .nav-icon.icon-light-bg img {
    width: 42px;
    height: 42px;
    object-fit: cover;
    max-width: none;
  }
  .nav-btn .nav-icon.icon-ice img { object-position: center 42%; }
  .nav-btn .nav-icon.icon-panpan img { object-position: center 38%; }
  .nav-btn .nav-icon.icon-griz img {
    width: 34px;
    height: 34px;
    object-fit: cover;
    object-position: center 36%;
    max-width: none;
  }
  .nav-btn .nav-icon.icon-bears img {
    width: 38px;
    height: 38px;
    object-fit: cover;
    object-position: center 35%;
    max-width: none;
  }
  .nav-btn.active {
    color: var(--accent);
    background: var(--nav-active-bg);
    border-color: var(--nav-active-border);
    box-shadow: inset 0 0 18px rgba(56, 189, 248, 0.08), 0 8px 18px rgba(0, 0, 0, 0.16);
  }
  .nav-btn.active .nav-icon { transform: scale(1.08); }
  .nav-btn.active .nav-icon img { filter: none; }
  [data-theme="light"] .bottom-nav {
    background: rgba(255, 255, 255, 0.82);
    box-shadow: 0 -12px 28px rgba(15, 23, 42, 0.10);
  }

  h1 { font-size: 1.6rem; color: var(--accent); }

  /* Theme Toggle */
  .theme-toggle {
    background: var(--bg-primary); border: 1px solid var(--border); color: var(--warning);
    width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; transition: background .2s, color .2s, border-color .2s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { background: var(--border); color: var(--text-primary); }

  /* Summary Cards */
  .summary {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 14px;
  }

  .card {
    background: var(--glass-bg); border-radius: 14px; padding: 14px;
    border: 1px solid var(--glass-border); transition: background .3s, border-color .3s, transform .2s, box-shadow .2s;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: var(--glass-shadow);
  }
  .card.budget-pair {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 12px;
  }
  .budget-page {
    position: relative;
    overflow: hidden;
  }
  .budget-page::before {
    content: none;
  }
  .budget-page > * {
    position: relative;
    z-index: 1;
  }
  .card.budget-pair.panpan-holder {
    position: relative;
    overflow: hidden;
    margin-top: 0;
    background:
      linear-gradient(to right, rgba(17, 26, 46, 0.90), rgba(17, 26, 46, 0.62)),
      url('/assets/bears/panda-budget.png') no-repeat right center / 240px auto;
    border-color: rgba(126, 200, 255, 0.14);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .card.budget-pair.panpan-holder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('/assets/bears/panda-budget.png') no-repeat right center / 240px auto;
    opacity: 0.18;
    filter: blur(1.5px);
    pointer-events: none;
    z-index: 0;
  }
  .panpan-holder::after,
  .panpan-img { display: none; }
  .panpan-holder .budget-half,
  .panpan-holder .budget-divider {
    position: relative;
    z-index: 1;
  }
  .budget-half { flex: 1; min-width: 0; overflow: hidden; }
  .budget-half label { display: block; }
  .budget-divider {
    width: 1px; align-self: stretch;
    background: var(--border);
  }

  .card label { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .card .value { font-size: 1.2rem; font-weight: 700; }
  .card .value.green { color: var(--success); }
  .card .value.red { color: var(--danger); }
  .card .value.blue, .card .value.accent { color: var(--accent); }
  .card .value.amber { color: var(--warning); }
  .card .value.purple { color: var(--purple); }

  .budget-input-group { display: flex; align-items: center; gap: 6px; }
  .budget-input-group input {
    background: var(--bg-primary); border: 1px solid var(--border-hover);
    padding: 4px 8px; border-radius: 6px; font-size: 1.1rem; font-weight: 700;
    width: 100%; color: var(--accent); transition: background .3s, border-color .3s;
  }
  .budget-input-group input:focus, .budget-input-group select:focus { outline: none; border-color: var(--accent); }
  .budget-input-group select {
    background: var(--bg-primary); border: 1px solid var(--border-hover);
    padding: 4px 8px; border-radius: 6px; font-size: 1.1rem; font-weight: 700;
    max-width: 100%; min-width: 0; color: var(--accent); transition: background .3s, border-color .3s;
    cursor: pointer; appearance: auto;
  }

  /* Calendar tab layout */
  .calendar-expense-layout { display: flex; flex-direction: column; gap: 12px; }

  /* Split view: 40/60 calendar vs transaction panel */
  #tab-calendar {
    position: relative;
    overflow: hidden;
  }
  #tab-calendar.active {
    display: flex;
    flex-direction: column;
    min-height: calc(100dvh - 190px);
  }
  .icebear-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    opacity: 0.18;
    filter: blur(3px);
    pointer-events: none;
    z-index: 0;
  }
  #tab-calendar .calendar-expense-layout,
  .calendar-wrap .weekdays,
  .calendar-wrap .days {
    position: relative;
    z-index: 1;
  }
  #tab-calendar .calendar-expense-layout {
    flex: 1;
    min-height: 0;
    gap: 10px;
  }

  /* Calendar */
  .calendar-wrap {
    background: rgba(8, 13, 26, 0.35); border-radius: 12px; padding: 12px;
    border: 1px solid rgba(126, 200, 255, 0.08); transition: background .3s, border-color .3s;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    flex: 0 0 40%;
    min-height: 220px;
    position: relative;
    overflow: hidden;
  }

  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 6px; }
  .weekdays span { font-size: .7rem; font-weight: 600; color: var(--text-tertiary); padding: 4px 0; text-transform: uppercase; }

  .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; transition: transform .25s ease, opacity .25s ease; }
  .days.slide-out-left  { transform: translateX(-100%); opacity: 0; }
  .days.slide-out-right { transform: translateX(100%);  opacity: 0; }
  .days.slide-in-left   { transform: translateX(100%);  opacity: 0; transition: none; }
  .days.slide-in-right  { transform: translateX(-100%); opacity: 0; transition: none; }
  .calendar-wrap { overflow: hidden; }

  .day,
  .calendar-cell {
    background: rgba(17, 26, 46, 0.6) !important;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(126, 200, 255, 0.08);
    border-radius: 12px;
    min-height: 52px; padding: 4px 5px;
    cursor: pointer; transition: border-color .2s, background .3s;
    position: relative; overflow: hidden;
  }
  .day:hover { border-color: var(--border-hover); }
  .day.today { border-color: var(--accent); }
  .day.selected {
    border-color: #60a5fa;
    background: linear-gradient(180deg, rgba(59,130,246,.28), rgba(37,99,235,.18));
    box-shadow: 0 0 0 1px rgba(96,165,250,.28), 0 0 18px rgba(37,99,235,.38);
  }
  .day.empty { background: transparent !important; cursor: default; border: none; }

  .day .day-num { font-size: .8rem; font-weight: 600; color: var(--text-secondary); }
  .day .day-total { font-size: .85rem; font-weight: 700; color: var(--danger); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day .day-sub { font-size: .7rem; color: var(--purple); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .day .dot-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
  .day .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }
  .day .dot.sub { background: var(--purple); }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }

  .panel {
    background: var(--glass-bg); border-radius: 14px; padding: 14px;
    border: 1px solid var(--glass-border); transition: background .3s, border-color .3s;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: var(--glass-shadow);
  }
  #tab-calendar .panel {
    flex: 1 1 60%;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg-elevated);
    border-top: 1px solid var(--border-hover);
  }
  .panel h3 { font-size: .9rem; margin-bottom: 10px; color: var(--text-heading); }

  /* Unified glass surfaces */
  .calendar-wrap,
  .savings-total-hero,
  .carousel-card,
  .month-card,
  .year-card-header,
  .summary-totals,
  .monthly-summary-section {
    border-color: var(--glass-border) !important;
    box-shadow: var(--glass-shadow);
  }
  .card:hover,
  .panel:hover,
  .carousel-card:hover,
  .month-card:hover {
    border-color: rgba(126, 200, 255, 0.24) !important;
  }

  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-row input, .form-row select {
    background: var(--bg-primary); border: 1px solid var(--border-hover); color: var(--text-primary);
    padding: 8px 10px; border-radius: 6px; font-size: .85rem; flex: 1;
    transition: background .3s, border-color .3s, color .3s;
  }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--accent); }

  .btn {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: .85rem; font-weight: 600; transition: background .2s;
  }
  .btn-primary { background: var(--btn-primary); color: #fff; }
  .btn-primary:hover { background: var(--btn-primary-hover); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: .85; }
  .btn-secondary { background: var(--border); color: var(--text-primary); }
  .btn-secondary:hover { opacity: .85; }

  /* Category badge */
  .cat-badge {
    display: inline-block; font-size: .65rem; padding: 1px 6px; border-radius: 999px;
    font-weight: 600; text-transform: uppercase; letter-spacing: .03em;
    background: var(--border); color: var(--text-secondary); margin-right: 4px; vertical-align: middle;
  }
  .cat-badge.food { background: #f97316; color: #fff; }
  .cat-badge.transport { background: #3b82f6; color: #fff; }
  .cat-badge.bills { background: #eab308; color: #1e293b; }
  .cat-badge.shopping { background: #ec4899; color: #fff; }
  .cat-badge.health { background: #22c55e; color: #fff; }
  .cat-badge.entertainment { background: #a855f7; color: #fff; }
  .cat-badge.other { background: var(--border-hover); color: var(--text-primary); }

  /* Edit/action buttons on expense items */
  .expense-item .edit-btn, .sub-item .edit-btn {
    background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: .85rem; padding: 0 4px;
  }
  .expense-item .edit-btn:hover, .sub-item .edit-btn:hover { color: var(--accent); }

  /* Confirm dialog overlay */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex;
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .confirm-box {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; max-width: 320px; width: 100%; text-align: center;
  }
  .confirm-box p { font-size: .95rem; margin-bottom: 16px; color: var(--text-primary); }
  .confirm-box .confirm-actions { display: flex; gap: 10px; justify-content: center; }
  .confirm-box .confirm-actions .btn { min-width: 90px; }

  /* Edit modal */
  .edit-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex;
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .edit-box {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; max-width: 360px; width: 100%;
  }
  .edit-box h3 { font-size: 1rem; margin-bottom: 14px; color: var(--text-heading); }
  .edit-box .form-row { margin-bottom: 10px; }
  .edit-box .edit-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  /* Month Detail Modal */
  .detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex;
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .detail-box {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; max-width: 420px; width: 100%; max-height: 85vh; overflow-y: auto;
  }
  .detail-box h3 { font-size: 1.1rem; margin-bottom: 4px; color: var(--text-primary); }
  .detail-box .detail-status { margin-bottom: 16px; }
  .detail-box .detail-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 18px;
  }
  .detail-box .ds-label { font-size: .65rem; text-transform: uppercase; color: var(--text-tertiary); letter-spacing: .04em; }
  .detail-box .ds-val { font-size: 1rem; font-weight: 700; }

  .detail-box .cat-section-title {
    font-size: .75rem; text-transform: uppercase; letter-spacing: .04em;
    color: var(--text-tertiary); margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .detail-box .cat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid var(--bg-elevated);
  }
  .detail-box .cat-row:last-child { border-bottom: none; }
  .detail-box .cat-row .cat-info { display: flex; align-items: center; gap: 8px; }
  .detail-box .cat-row .cat-amount { font-weight: 600; color: var(--danger); font-size: .9rem; }
  .detail-box .cat-row .cat-pct { font-size: .75rem; color: var(--text-tertiary); min-width: 38px; text-align: right; }
  .detail-box .cat-bar-bg {
    flex: 1; height: 6px; background: var(--border); border-radius: 3px; margin: 0 8px;
    min-width: 40px; max-width: 80px;
  }
  .detail-box .cat-bar { height: 100%; border-radius: 3px; }

  .detail-box .detail-actions { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
  .detail-box .detail-actions .btn { min-width: 100px; }

  .expense-list { max-height: 240px; overflow-y: auto; }
  #tab-calendar .expense-list {
    flex: 1;
    min-height: 0;
    max-height: none;
    margin-top: 10px;
  }

  .expense-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--bg-surface);
  }
  .expense-item:last-child { border-bottom: none; }
  .expense-item .name { font-size: .85rem; }
  .expense-item .amount { font-weight: 600; color: var(--danger); font-size: .85rem; }
  .expense-item .del-btn {
    background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 1rem; padding: 0 4px;
  }
  .expense-item .del-btn:hover { color: var(--danger); }

  .sub-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--bg-surface); gap: 6px;
  }
  .sub-item:last-child { border-bottom: none; }
  .sub-item.paid .info, .sub-item.paid .amount { opacity: .5; text-decoration: line-through; }
  .sub-item .info { font-size: .85rem; flex: 1; }
  .sub-item .info small { color: var(--text-tertiary); display: block; font-size: .75rem; }
  .sub-item .amount { font-weight: 600; color: var(--purple); font-size: .85rem; }
  .sub-check {
    width: 18px; height: 18px; accent-color: var(--success); cursor: pointer; flex-shrink: 0;
  }
  .sub-item .del-btn {
    background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 1rem; padding: 0 4px;
  }
  .sub-item .del-btn:hover { color: var(--danger); }

  /* Bottom sheet for recurring delete */
  .bottom-sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .bottom-sheet {
    background: var(--bg-surface); border-radius: 16px 16px 0 0;
    width: 100%; max-width: 500px; padding: 12px 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
  }
  .bottom-sheet .sheet-handle {
    width: 36px; height: 4px; background: var(--border-hover); border-radius: 2px;
    margin: 0 auto 12px;
  }
  .bottom-sheet .sheet-title {
    font-size: .9rem; color: var(--text-secondary); text-align: center; margin-bottom: 12px;
  }
  .bottom-sheet .sheet-btn {
    display: block; width: 100%; min-height: 56px; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 8px;
    padding: 16px; text-align: center; -webkit-tap-highlight-color: transparent;
  }
  .bottom-sheet .sheet-btn.danger { background: var(--danger); color: #fff; }
  .bottom-sheet .sheet-btn.warn { background: var(--warning); color: #1e293b; }
  .bottom-sheet .sheet-btn.cancel { background: var(--bg-elevated); color: var(--text-primary); }

  /* Duplicate button */
  .expense-item .dup-btn {
    background: none; border: none; color: var(--text-tertiary); cursor: pointer;
    font-size: .85rem; padding: 0 4px; min-width: 28px; min-height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .expense-item .dup-btn:hover { color: var(--success); }

  /* Repeat badge */
  .repeat-badge {
    display: inline-block; font-size: .6rem; text-transform: uppercase; letter-spacing: .03em;
    background: var(--accent); color: #fff; border-radius: 4px; padding: 1px 5px;
    margin-left: 4px; vertical-align: middle;
  }

  /* Duplicate button for sub items */
  .sub-item .dup-btn {
    background: none; border: none; color: var(--text-tertiary); cursor: pointer;
    font-size: .85rem; padding: 0 4px; min-width: 28px; min-height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .sub-item .dup-btn:hover { color: var(--success); }

  /* Mobile touch targets */
  @media (max-width: 900px) {
    .expense-item .edit-btn, .expense-item .del-btn, .expense-item .dup-btn,
    .sub-item .edit-btn, .sub-item .del-btn, .sub-item .dup-btn {
      min-width: 48px; min-height: 48px; display: inline-flex;
      align-items: center; justify-content: center; font-size: 1.1rem;
    }
  }

  .selected-date-label { font-size: .85rem; color: var(--accent); margin-bottom: 8px; }

  .progress-bar-bg {
    background: var(--border); border-radius: 999px; height: 10px; overflow: hidden; margin-top: 6px;
  }
  .progress-bar { height: 100%; border-radius: 999px; transition: width .4s; }

  .empty-msg { color: var(--border-hover); font-size: .8rem; font-style: italic; padding: 8px 0; }

  /* ── Monthly Summary Section ─────────────────────────────────── */
  .monthly-summary-section { }

  .summary-toggle { display: none; }

  .summary-table-wrap { display: block; overflow: visible; max-height: none; }

  /* ── Desktop Table View ── */
  .summary-table { width: 100%; border-collapse: collapse; font-size: .85rem; }

  .summary-table thead th {
    background: var(--bg-primary); padding: 10px 14px; text-align: left;
    font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
    color: var(--text-tertiary); font-weight: 600; position: sticky; top: 0;
  }

  .year-header-row {
    cursor: pointer; transition: background .15s; background: var(--bg-elevated);
  }
  .year-header-row:hover { background: var(--year-header-hover); }

  .year-header-cell { display: flex; align-items: center; gap: 8px; }
  .year-chevron { font-size: .7rem; color: var(--accent); display: inline-block; width: 14px; }
  .year-header-row td { padding: 12px 14px; font-weight: 600; border-bottom: 2px solid var(--border); }

  .month-row {
    border-bottom: 1px solid var(--bg-surface); cursor: pointer; transition: background .15s;
  }
  .month-row:hover { background: var(--border); }
  .month-row td { padding: 10px 14px; padding-left: 36px; }
  .month-row td:first-child { padding-left: 42px; }

  .month-row.current-row { background: var(--current-row-bg); }
  .month-row.current-row:hover { background: var(--current-row-hover); }
  .month-row.viewing-row { border-left: 3px solid var(--purple); }

  .summary-table td.month-name { font-weight: 600; color: var(--text-primary); }
  .summary-table td.budget-col { color: var(--accent); }
  .summary-table td.spent-col { color: var(--danger); }
  .summary-table td.subs-col { color: var(--purple); }
  .summary-table td.remain-col.positive { color: var(--success); }
  .summary-table td.remain-col.negative { color: var(--danger); }
  .summary-table td.status-col { text-align: center; }

  .status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
  }
  .status-badge.empty { background: var(--status-empty-bg); color: var(--status-empty-text); }
  .status-icon { width: 28px; height: 28px; vertical-align: middle; }

  /* ── Mobile Card View ── */
  .summary-cards-mobile { display: none; padding: 12px; }

  .year-card-group { margin-bottom: 16px; }

  .year-card-header {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg-elevated); padding: 14px 16px; border-radius: 10px;
    cursor: pointer; border: 1px solid var(--border); transition: background .15s;
  }
  .year-card-header:hover { background: var(--year-header-hover); }

  .year-card-header .year-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 1.05rem; font-weight: 700; color: var(--text-primary);
  }
  .year-card-header .year-title .year-chevron { font-size: .7rem; color: var(--accent); }

  .year-card-header .year-stats {
    display: flex; gap: 12px; font-size: .75rem;
  }
  .year-card-header .year-stats .ys-budget { color: var(--accent); }
  .year-card-header .year-stats .ys-remain { font-weight: 600; }
  .year-card-header .year-stats .ys-remain.positive { color: var(--success); }
  .year-card-header .year-stats .ys-remain.negative { color: var(--danger); }

  .month-cards { display: flex; flex-direction: column; gap: 8px; padding-top: 8px; padding-left: 8px; }

  .month-card {
    background: var(--bg-primary); border-radius: 10px; padding: 14px;
    border: 1px solid var(--bg-surface); cursor: pointer; transition: background .15s, border-color .15s;
  }
  .month-card:hover { background: var(--month-card-hover); border-color: var(--border); }
  .month-card.current-card { border-color: var(--accent); }
  .month-card.viewing-card { border-left: 3px solid var(--purple); }

  .month-card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .month-card-head .mc-name { font-weight: 700; font-size: .95rem; color: var(--text-primary); }
  .month-card-head .mc-status { }

  .month-card-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px;
  }
  .month-card-grid .mc-item { }
  .month-card-grid .mc-label {
    font-size: .65rem; text-transform: uppercase; letter-spacing: .04em;
    color: var(--text-tertiary);
  }
  .month-card-grid .mc-val { font-size: .9rem; font-weight: 600; }
  .month-card-grid .mc-val.blue { color: var(--accent); }
  .month-card-grid .mc-val.red { color: var(--danger); }
  .month-card-grid .mc-val.purple { color: var(--purple); }
  .month-card-grid .mc-val.green { color: var(--success); }

  /* ── Grand Totals ── */
  .summary-totals {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; padding: 16px; border-top: 2px solid var(--border);
  }
  .summary-totals .st-year-group { margin-bottom: 14px; }
  .summary-totals .st-year-group:last-child { margin-bottom: 0; }
  .summary-totals .st-year-label {
    font-size: .8rem; font-weight: 700; color: var(--text-heading);
    margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .summary-totals .st-year-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;
  }
  .summary-totals .st-card { text-align: center; }
  .summary-totals .st-label { font-size: .7rem; text-transform: uppercase; color: var(--text-tertiary); letter-spacing: .05em; }
  .summary-totals .st-value { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .day { min-height: 46px; padding: 3px 3px; }
    .day .day-num { font-size: .65rem; }
    .day .day-total { font-size: .55rem; margin-top: 1px; }
    .day .day-sub { font-size: .5rem; }
    .day .dot { width: 4px; height: 4px; }
    .day .dot-row { gap: 2px; margin-top: 2px; }
    .days { gap: 2px; }
    .summary-table { display: none; }
    .summary-cards-mobile { display: block; }
    .summary-totals { padding: 10px; }
    .summary-totals .st-year-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .summary-totals .st-value { font-size: .95rem; }
    .year-card-header .year-stats { display: none; }
  }

  @media (min-width: 641px) {
    .summary-cards-mobile { display: none !important; }
  }

  /* ── Auth Screen ── */
  .auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }

  .auth-box {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 32px; width: 100%; max-width: 380px; transition: background .3s, border-color .3s;
  }

  .auth-box h2 {
    color: var(--accent); font-size: 1.4rem; margin-bottom: 6px; text-align: center;
  }

  .auth-box p {
    color: var(--text-tertiary); font-size: .85rem; text-align: center; margin-bottom: 20px;
  }

  .auth-box .form-row { margin-bottom: 12px; }

  .auth-box input, .auth-box select {
    background: var(--bg-primary); border: 1px solid var(--border-hover); color: var(--text-primary);
    padding: 10px 12px; border-radius: 8px; font-size: .9rem; width: 100%;
    transition: background .3s, border-color .3s, color .3s;
  }
  .auth-box input:focus, .auth-box select:focus { outline: none; border-color: var(--accent); }

  .auth-box select { cursor: pointer; appearance: auto; }

  .auth-box .btn {
    width: 100%; padding: 12px; font-size: .95rem; margin-top: 4px;
  }

  .auth-divider {
    display: flex; align-items: center; gap: 12px; margin: 16px 0;
    color: var(--border-hover); font-size: .8rem;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .google-btn {
    background: var(--google-btn-bg); color: var(--google-btn-text); width: 100%; padding: 11px;
    font-size: .9rem; display: flex; align-items: center;
    justify-content: center; gap: 10px; border-radius: 8px;
    transition: background .2s;
  }
  .google-btn:hover { background: var(--google-btn-hover); }

  .auth-error {
    color: var(--danger); font-size: .8rem; text-align: center;
    min-height: 20px; margin-top: 10px;
  }

  /* ── User Bar ── */
  .user-bar {
    display: none; justify-content: space-between; align-items: center;
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 16px; margin-bottom: 16px; font-size: .85rem;
    transition: background .3s, border-color .3s;
  }

  .user-bar .user-info { color: var(--text-secondary); }
  .user-bar .user-info strong { color: var(--text-primary); }

  .user-bar-actions { display: flex; align-items: center; gap: 8px; }

  .user-bar .logout-btn {
    background: none; border: 1px solid var(--border-hover); color: var(--text-secondary);
    padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: .8rem;
    transition: background .2s, color .2s;
  }
  .user-bar .logout-btn:hover { background: var(--border); color: var(--text-primary); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

  /* Loading Splash Screen */
  .loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #d98a7e;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
    transition: opacity .4s ease;
  }
  .loading-screen.fade-out { opacity: 0; pointer-events: none; }

  .loading-cat {
    width: 200px; max-width: 60vw;
    animation: catBounce 1.2s ease-in-out infinite;
  }
  @keyframes catBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .loading-bar-track {
    width: 200px; max-width: 60vw; height: 28px;
    background: #fff; border-radius: 14px;
    overflow: hidden; position: relative;
  }
  .loading-bar-fill {
    height: 100%; width: 30%;
    background: linear-gradient(90deg, #f5c542, #f0a830);
    border-radius: 14px;
    animation: barSlide 1.5s ease-in-out infinite;
  }
  @keyframes barSlide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(430%); }
  }

  .loading-text {
    font-size: .9rem; font-weight: 700; color: #fff;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(3, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }

  /* ── Savings Redesign ── */

  /* Carousel */
  .savings-carousel-wrap {
    overflow: hidden;
    padding-bottom: 24px;
  }

  /* Static total hero above carousel */
  .savings-total-hero {
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(to right, rgba(17, 26, 46, 0.82), rgba(17, 26, 46, 0.52)),
      url('/assets/griz.png') no-repeat center 35% / cover;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    margin-bottom: 12px;
    text-align: center;
  }
  .savings-total-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('/assets/griz.png') no-repeat center 35% / cover;
    opacity: 0.18;
    filter: blur(1.5px);
    pointer-events: none;
    z-index: 0;
  }
  .savings-total-hero > * {
    position: relative;
    z-index: 1;
  }
  .savings-total-hero .hero-label {
    font-size: .7rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-tertiary); margin-bottom: 6px;
  }
  .savings-total-hero .hero-amount {
    font-size: 2.2rem; font-weight: 800; color: var(--success);
  }
  .savings-carousel {
    display: flex;
    transition: transform 0.3s ease;
  }
  .carousel-card {
    flex-shrink: 0;
    width: 100%;
    background: var(--bg-surface);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
  }
  .carousel-dots {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
  }
  .carousel-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border-hover);
    transition: background 0.2s;
  }
  .carousel-dot.active {
    background: var(--accent);
  }

  /* FAB */
  .savings-fab-wrap {
    position: fixed;
    bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    z-index: 200;
  }
  .fab {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .fab.open {
    transform: rotate(45deg);
  }
  .fab-menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }
  .fab-menu[hidden] {
    display: none !important;
  }
  .fab-action {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    -webkit-tap-highlight-color: transparent;
  }
  .fab-action:hover { background: var(--bg-elevated); }

  /* Deposit Feed */
  .deposit-feed {
    display: flex;
    flex-direction: column;
  }
  .feed-month-header {
    position: sticky;
    top: 0;
    background: var(--bg-primary);
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-tertiary);
    padding: 8px 0 4px;
    z-index: 10;
  }
  .feed-entry {
    position: relative;
    overflow: hidden;
    margin-bottom: 6px;
    border-radius: 10px;
  }
  .feed-entry-inner {
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 12px;
    background: var(--bg-surface);
    border-radius: 10px;
    transition: transform 0.2s ease;
    position: relative;
    z-index: 1;
  }
  .feed-action-delete {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    background: var(--danger);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    color: #fff;
    font-size: .85rem;
    font-weight: 600;
    border-radius: 0 10px 10px 0;
  }
  .feed-action-edit {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: #3b82f6;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    color: #fff;
    font-size: .85rem;
    font-weight: 600;
    border-radius: 10px 0 0 10px;
  }

  /* Bottom sheet form fields */
  .sheet-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
  }
  .sheet-field label {
    font-size: .75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .sheet-field input,
  .sheet-field select {
    background: var(--bg-primary);
    border: 1px solid var(--border-hover);
    color: var(--text-primary);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: .95rem;
    width: 100%;
    transition: border-color .2s;
  }
  .sheet-field input:focus,
  .sheet-field select:focus { outline: none; border-color: var(--accent); }
  .sheet-field-error {
    font-size: .75rem;
    color: var(--danger);
    min-height: 16px;
  }
  /* Record Deposit alignment refinements */
  #depositSheet .sheet-field {
    align-items: stretch;
    margin-bottom: 10px;
  }
  #depositSheet .sheet-field label {
    display: block;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  #depositSheet .sheet-field input,
  #depositSheet .sheet-field select {
    display: block;
    width: 100%;
    min-height: 44px;
    line-height: 1.2;
    margin: 0;
    font-family: inherit;
  }
  #depositSheet input[type="date"] {
    text-align: left;
    appearance: none;
    -webkit-appearance: none;
  }
  #depositSheet input[type="date"]::-webkit-date-and-time-value {
    text-align: left;
  }
  #depositSheet input[type="date"]::-webkit-date-and-time-value,
  #depositSheet input[type="date"]::-webkit-datetime-edit {
    min-height: 1.2em;
  }
  #depositSheet .sheet-field-error {
    display: block;
    line-height: 1.2;
    margin-top: 2px;
  }

  /* Shimmer animation */
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .bank-card-shimmer {
    background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.3) 50%, transparent 75%);
    background-size: 200% 100%;
    animation: shimmer 0.7s ease forwards;
  }

  /* Confetti animations */
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .confetti-particle {
    position: fixed;
    pointer-events: none;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  .confetti-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9000;
  }
</style>
</head>
<body>

<!-- Loading Splash Screen -->
<div id="loadingScreen" class="loading-screen">
  <img src="/icons/loading-cat.png" alt="Loading" class="loading-cat">
  <div class="loading-bar-track">
    <div class="loading-bar-fill"></div>
  </div>
  <div class="loading-text">LOADING<span class="loading-dots"></span></div>
</div>

<!-- Auth Screen -->
<div class="auth-screen" id="authScreen" style="display:none;">
  <div class="auth-box">
    <h2>Budget Tracker</h2>
    <p>Sign in to sync your budget across devices</p>
    <div class="form-row">
      <select id="authMode">
        <option value="login">Log In</option>
        <option value="signup">Sign Up</option>
      </select>
    </div>
    <div class="form-row">
      <input type="email" id="authEmail" placeholder="Email address" autocomplete="email">
    </div>
    <div class="form-row">
      <input type="password" id="authPassword" placeholder="Password (min 6 chars)" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="authSubmit">Log In</button>
    <div class="auth-divider"><span>or</span></div>
    <button class="btn google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- Main App (hidden until logged in) -->
<div class="app" id="appMain" style="display:none;">
<div class="app-shell">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <h1 id="pageTitle">Calendar</h1>
    </div>
    <div class="month-nav">
      <button id="prevMonth">&larr;</button>
      <span id="monthLabel"></span>
      <button id="nextMonth">&rarr;</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle light and dark theme">&#9790;</button>
      <button class="logout-btn" id="logoutBtn" style="background:none;border:1px solid var(--border-hover);color:var(--text-secondary);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.75rem;">Out</button>
    </div>
  </div>

  <!-- Tab Content -->
  <div class="tab-content">

    <!-- Tab: Calendar -->
    <div class="tab-pane active" id="tab-calendar">
      <div class="calendar-expense-layout">
        <div class="calendar-wrap">
          <img class="icebear-bg" src="/assets/icebear-bg.png" alt="" aria-hidden="true">
          <div class="weekdays">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
            <span>Thu</span><span>Fri</span><span>Sat</span>
          </div>
          <div class="days" id="calendarGrid"></div>
        </div>
        <div class="panel">
          <h3>Add Expense</h3>
          <div class="selected-date-label" id="selectedDateLabel">Select a day</div>
          <div class="form-row">
            <input type="text" id="expenseName" placeholder="Description">
            <input type="number" id="expenseAmount" placeholder="Amount" min="0" step="0.01" inputmode="decimal" style="max-width:100px;">
          </div>
          <div class="form-row">
            <select id="expenseCategory">
              <option value="">No Category</option>
              <option value="food">Food</option>
              <option value="transport">Transport</option>
              <option value="bills">Bills</option>
              <option value="shopping">Shopping</option>
              <option value="health">Health</option>
              <option value="entertainment">Entertainment</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-row">
            <select id="expenseRepeat" style="width:100%;min-height:44px;">
              <option value="">Repeat: None</option>
              <option value="daily">Repeat: Daily</option>
              <option value="weekly">Repeat: Weekly</option>
              <option value="monthly">Repeat: Monthly</option>
            </select>
          </div>
          <button class="btn btn-primary" id="addExpenseBtn" style="width:100%;min-height:44px;">Add Expense</button>
          <div class="expense-list" id="expenseList" style="margin-top:10px;"></div>
        </div>
      </div>
    </div>

    <!-- Tab: Budget -->
    <div class="tab-pane budget-page" id="tab-budget">
      <div class="summary">
        <div class="card budget-pair panpan-holder">
          <div class="budget-half">
            <label>Monthly Income</label>
            <div class="budget-input-group">
              <span style="font-size:1.1rem;font-weight:700;color:var(--text-tertiary);">&#8369;</span>
              <input type="number" id="budgetInput" min="0" step="0.01" placeholder="0.00">
            </div>
          </div>
          <div class="budget-divider"></div>
          <div class="budget-half">
            <label>Daily Budget</label>
            <div class="budget-input-group">
              <span style="font-size:1.1rem;font-weight:700;color:var(--text-tertiary);">&#8369;</span>
              <select id="dailyBudgetInput">
                <option value="0">Select</option>
                <option value="10000">10,000</option>
                <option value="12000">12,000</option>
                <option value="13000">13,000</option>
                <option value="14000">14,000</option>
                <option value="15000">15,000</option>
              </select>
            </div>
          </div>
          <img class="panpan-img" src="/assets/panpan.png" alt="" aria-hidden="true">
        </div>
        <div class="card">
          <label>Daily Expenses</label>
          <div class="value red" id="totalSpent">&#8369;0.00</div>
        </div>
        <div class="card">
          <label>Subscriptions</label>
          <div class="value purple" id="totalSubs">&#8369;0.00</div>
        </div>
        <div class="card">
          <label>Remaining</label>
          <div class="value green" id="remaining">&#8369;0.00</div>
          <div class="progress-bar-bg">
            <div class="progress-bar" id="progressBar" style="width:100%;background:var(--success);"></div>
          </div>
        </div>
        <div class="card">
          <label>Daily Average</label>
          <div class="value amber" id="dailyAvg">&#8369;0.00</div>
        </div>
      </div>
      <div class="sidebar">
        <div class="panel">
          <h3>Subscriptions</h3>
          <div class="form-row">
            <input type="text" id="subName" placeholder="Name (e.g. Netflix)">
          </div>
          <div class="form-row">
            <input type="number" id="subAmount" placeholder="Amount" min="0" step="0.01">
            <input type="date" id="subDay">
          </div>
          <div class="form-row">
            <select id="subRepeat" style="width:100%;min-height:44px;">
              <option value="">Repeat: None</option>
              <option value="daily">Repeat: Daily</option>
              <option value="weekly">Repeat: Weekly</option>
              <option value="monthly">Repeat: Monthly</option>
            </select>
          </div>
          <button class="btn btn-primary" id="addSubBtn" style="width:100%;min-height:44px;">Add Subscription</button>
          <div id="subList" style="margin-top:10px;"></div>
        </div>
      </div>
    </div>

    <!-- Tab: Savings -->
    <div class="tab-pane" id="tab-savings">
      <!-- Static total hero -->
      <div class="savings-total-hero" id="savingsTotalHero"></div>
      <!-- Bank carousel -->
      <div class="savings-carousel-wrap">
        <div class="savings-carousel" id="savingsCarousel"></div>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>
      <div class="deposit-feed" id="depositFeed"></div>
      <div class="savings-fab-wrap" id="savingsFabWrap">
        <div class="fab-menu" id="fabMenu" hidden>
          <button class="fab-action" id="fabDeposit">💰 Record Deposit</button>
          <button class="fab-action" id="fabAddBank">🏦 Add Bank</button>
        </div>
        <button class="fab" id="savingsFab" aria-label="Quick actions">＋</button>
      </div>
    </div>

    <!-- Tab: Summary -->
    <div class="tab-pane" id="tab-summary">
      <div class="monthly-summary-section">
        <div class="summary-table-wrap" id="summaryWrap">
          <table class="summary-table">
            <thead>
              <tr>
                <th>Month / Year</th>
                <th>Budget</th>
                <th>Expenses</th>
                <th>Subs</th>
                <th>Remaining</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
          </table>
          <div class="summary-cards-mobile" id="summaryCardsMobile"></div>
          <div class="summary-totals" id="summaryTotals"></div>
        </div>
      </div>
    </div>

  </div><!-- end tab-content -->

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="calendar">
      <span class="nav-icon icon-light-bg icon-ice"><img src="/assets/ice-bear-nav.png" alt=""></span>
      <span>Calendar</span>
    </button>
    <button class="nav-btn" data-tab="budget">
      <span class="nav-icon icon-light-bg icon-panpan"><img src="/assets/panpan2.png" alt=""></span>
      <span>Budget</span>
    </button>
    <button class="nav-btn" data-tab="savings">
      <span class="nav-icon icon-griz"><img src="/assets/griz1.png" alt=""></span>
      <span>Savings</span>
    </button>
    <button class="nav-btn" data-tab="summary">
      <span class="nav-icon icon-bears"><img src="/assets/three-bears.webp" alt=""></span>
      <span>Summary</span>
    </button>
  </nav>

</div><!-- end app-shell -->
</div><!-- end appMain -->

<div id="dialogContainer"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
